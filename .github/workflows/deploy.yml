name: MyST Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install MyST
        run: npm install -g mystmd

      - name: Setup Typst (for PDF export)
        uses: typst-community/setup-typst@v3

      - name: Build HTML
        run: myst build --html

      - name: Build PDF
        run: myst build --pdf
        continue-on-error: true

      - name: Copy PDF into site output
        run: |
          mkdir -p _build/html/exports
          cp exports/*.pdf _build/html/ 2>/dev/null || true
          cp _build/exports/*.pdf _build/html/ 2>/dev/null || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
